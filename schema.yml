openapi: 3.0.3
info:
  title: Betatrax API
  version: 1.0.0
  description: API documentation for the Betatrax defect tracking system.
paths:
  /api/auth/login/:
    post:
      operationId: auth_login_create
      tags:
      - auth
      requestBody:
        content:
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/AuthToken'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/AuthToken'
          application/json:
            schema:
              $ref: '#/components/schemas/AuthToken'
        required: true
      security:
      - tokenAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthToken'
          description: ''
  /api/auth/logout/:
    post:
      operationId: auth_logout_create
      tags:
      - auth
      security:
      - tokenAuth: []
      - cookieAuth: []
      responses:
        '200':
          description: No response body
  /api/defects/:
    get:
      operationId: defects_list_get
      tags:
      - defects
      security:
      - tokenAuth: []
      - cookieAuth: []
      - {}
      responses:
        '200':
          description: No response body
    post:
      operationId: defects_list_post
      tags:
      - defects
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DefectReport'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/DefectReport'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/DefectReport'
        required: true
      security:
      - tokenAuth: []
      - cookieAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DefectReport'
          description: ''
  /api/defects/{defect_id}/:
    get:
      operationId: defects_detail
      parameters:
      - in: path
        name: defect_id
        schema:
          type: integer
        required: true
      tags:
      - defects
      security:
      - tokenAuth: []
      - cookieAuth: []
      responses:
        '200':
          description: No response body
  /api/defects/{defect_id}/approve/:
    post:
      operationId: defects_approve_create
      parameters:
      - in: path
        name: defect_id
        schema:
          type: integer
        required: true
      tags:
      - defects
      security:
      - tokenAuth: []
      - cookieAuth: []
      responses:
        '200':
          description: No response body
  /api/defects/{defect_id}/assign/:
    post:
      operationId: defects_assign_create
      parameters:
      - in: path
        name: defect_id
        schema:
          type: integer
        required: true
      tags:
      - defects
      security:
      - tokenAuth: []
      - cookieAuth: []
      responses:
        '200':
          description: No response body
  /api/defects/{defect_id}/comments/:
    get:
      operationId: defects_comments_list
      parameters:
      - in: path
        name: defect_id
        schema:
          type: integer
        required: true
      tags:
      - defects
      security:
      - tokenAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Comment'
          description: ''
    post:
      operationId: defects_comments_create
      parameters:
      - in: path
        name: defect_id
        schema:
          type: integer
        required: true
      tags:
      - defects
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Comment'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/Comment'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/Comment'
        required: true
      security:
      - tokenAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Comment'
          description: ''
  /api/defects/{defect_id}/mark-cannot-reproduce/:
    post:
      operationId: defects_mark_cannot_reproduce_create
      parameters:
      - in: path
        name: defect_id
        schema:
          type: integer
        required: true
      tags:
      - defects
      security:
