      security:
      - tokenAuth: []
      - cookieAuth: []
      responses:
        '200':
          description: No response body
  /api/defects/{defect_id}/resolve/:
    post:
      operationId: defects_resolve_create
      parameters:
      - in: path
        name: defect_id
        schema:
          type: integer
        required: true
      tags:
      - defects
      security:
      - tokenAuth: []
      - cookieAuth: []
      responses:
        '200':
          description: No response body
  /api/employees/{employee_id}/effectiveness/:
    get:
      operationId: employees_effectiveness_retrieve
      parameters:
      - in: path
        name: employee_id
        schema:
          type: integer
        required: true
      tags:
      - employees
      security:
      - tokenAuth: []
      - cookieAuth: []
      responses:
        '200':
          description: No response body
  /api/products/:
    post:
      operationId: products_create
      tags:
      - products
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Product'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/Product'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/Product'
        required: true
      security:
      - tokenAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Product'
          description: ''
components:
  schemas:
    AuthToken:
      type: object
      properties:
        username:
          type: string
          writeOnly: true
        password:
          type: string
          writeOnly: true
        token:
          type: string
          readOnly: true
      required:
      - password
      - token
      - username
    Comment:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        text:
          type: string
        date:
          type: string
          format: date-time
          readOnly: true
        defect_report:
          type: integer
          readOnly: true
        author:
          type: integer
          readOnly: true
      required:
      - author
      - date
      - defect_report
      - id
      - text
    DefectReport:
      type: object
      description: Serializer for creating and viewing defect reports.
      properties:
        id:
          type: integer
          readOnly: true
        title:
          type: string
          maxLength: 255
        description:
          type: string
        steps_to_reproduce:
          type: string
        product:
          type: integer
        tester_id:
          type: string
          maxLength: 100
        tester_email:
          type: string
          format: email
          nullable: true
          maxLength: 254
        status:
          allOf:
          - $ref: '#/components/schemas/StatusEnum'
          readOnly: true
        severity:
          readOnly: true
          nullable: true
          oneOf:
          - $ref: '#/components/schemas/SeverityEnum'
          - $ref: '#/components/schemas/NullEnum'
        priority:
          readOnly: true
          nullable: true
          oneOf:
          - $ref: '#/components/schemas/PriorityEnum'
          - $ref: '#/components/schemas/NullEnum'
        assigned_developer:
          type: integer
          readOnly: true
          nullable: true
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - assigned_developer
      - created_at
      - description
      - id
      - priority
      - product
      - severity
      - status
      - steps_to_reproduce
      - tester_id
      - title
      - updated_at
    NullEnum:
      enum:
      - null
    PriorityEnum:
      enum:
      - Critical
      - High
      - Medium
      - Low
      type: string
      description: |-
        * `Critical` - Critical
        * `High` - High
        * `Medium` - Medium
        * `Low` - Low
    Product:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        name:
          type: string
          maxLength: 255
      required:
      - id
      - name
    SeverityEnum:
      enum:
      - Critical
      - Major
      - Minor
      - Low
      type: string
      description: |-
        * `Critical` - Critical
        * `Major` - Major
        * `Minor` - Minor
        * `Low` - Low
    StatusEnum:
      enum:
      - New
      - Open
      - Assigned
      - Fixed
      - Resolved
      - Rejected
      - Duplicate
      - Cannot Reproduce
      - Reopened
      type: string
      description: |-
        * `New` - New
        * `Open` - Open
        * `Assigned` - Assigned
        * `Fixed` - Fixed
        * `Resolved` - Resolved
        * `Rejected` - Rejected
        * `Duplicate` - Duplicate
        * `Cannot Reproduce` - Cannot Reproduce
        * `Reopened` - Reopened
  securitySchemes:
    cookieAuth:
      type: apiKey
      in: cookie
      name: sessionid
    tokenAuth:
      type: apiKey
      in: header
      name: Authorization
      description: Token-based authentication with required prefix "Token"
