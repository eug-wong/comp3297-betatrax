      - tokenAuth: []
      - cookieAuth: []
      responses:
        '200':
          description: No response body
  /api/defects/{defect_id}/reopen/:
    post:
      operationId: defects_reopen_create
      parameters:
      - in: path
        name: defect_id
        schema:
          type: integer
        required: true
      tags:
