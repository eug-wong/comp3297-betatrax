      - cookieAuth: []
      responses:
        '200':
          description: No response body
  /api/defects/{defect_id}/reject/:
    post:
      operationId: defects_reject_create
      parameters:
      - in: path
        name: defect_id
        schema:
          type: integer
        required: true
      tags:
